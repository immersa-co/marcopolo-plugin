name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create ZIP artifact
        run: |
          zip -r marcopolo-plugin.zip . \
            --exclude ".git/*" --exclude ".github/*"

      - name: Build per-skill ZIPs
        run: |
          mkdir -p dist
          for d in skills/*/; do
            name=$(basename "$d")
            (cd skills && zip -r "../dist/${name}.zip" "$name" -x "*.DS_Store" "*/__pycache__/*")
          done

      - name: Bundle skill ZIPs
        run: (cd dist && zip ../marcopolo-skills.zip *.zip)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            marcopolo-plugin.zip marcopolo-skills.zip \
            --generate-notes \
            --title "MarcoPolo Plugin ${{ github.ref_name }}"
