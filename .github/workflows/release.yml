name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP artifact
        run: |
          zip -r marcopolo-plugin.zip . \
            --exclude ".git/*" --exclude ".github/*"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            marcopolo-plugin.zip \
            --generate-notes \
            --title "MarcoPolo Plugin ${{ github.ref_name }}"
